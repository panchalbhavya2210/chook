name: Sync Sanity to GitHub

on:
  repository_dispatch:
    types: [sanity-sync]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run sync script
        run: node syncsan.js
        env:
          PRJID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          ABC_GITHUB_TOKEN: ${{ secrets.ABC_GITHUB_TOKEN }}