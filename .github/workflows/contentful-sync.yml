name: Sync from Contentful

on:
  repository_dispatch:
    types: [contentful-update]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install contentful

      - name: Run sync
        run: node sync.js
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          ABC_GITHUB_TOKEN: ${{ secrets.ABC_GITHUB_TOKEN }}
